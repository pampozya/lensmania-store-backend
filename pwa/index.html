<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LensAI" />
  <title>Lensmania AI</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f172a;
      --surface:      #1e293b;
      --surface2:     #263248;
      --border:       #334155;
      --accent:       #6366f1;
      --accent-hover: #4f46e5;
      --text:         #f1f5f9;
      --muted:        #94a3b8;
      --danger:       #ef4444;
      --radius-msg:   14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.55;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
    }

    @media (min-width: 720px) {
      body { background: #070d1a; }
      .shell {
        max-width: 760px;
        height: min(90dvh, 900px);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0,0,0,.6);
      }
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(99,102,241,.18);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,.3);
      letter-spacing: .3px;
    }

    /* ── Messages ────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 40px 20px;
      pointer-events: none;
    }

    .empty-icon {
      font-size: 44px;
      opacity: .35;
      line-height: 1;
    }

    .empty-state h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .empty-state p {
      font-size: 14px;
      max-width: 280px;
    }

    /* ── Message bubbles ─────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp .18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.ai { align-self: flex-start; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      margin-top: 2px;
    }

    .msg.user .avatar {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius-msg);
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.error .bubble {
      background: rgba(239,68,68,.12);
      border-color: rgba(239,68,68,.3);
      color: #fca5a5;
    }

    /* ── Typing indicator ────────────────────────────────────── */
    .msg.typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .msg.typing .bubble::before,
    .msg.typing .bubble::after,
    .dot {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(1);   opacity: .5; }
      40%            { transform: scale(1.3); opacity: 1;  }
    }

    /* ── Input area ──────────────────────────────────────────── */
    footer {
      padding: 12px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 13px;
      resize: none;
      height: 42px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      transition: border-color .15s;
      overflow-y: auto;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--muted); }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
    }

    #send-btn {
      background: var(--accent);
      color: #fff;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }

    #clear-btn {
      background: var(--surface2);
      color: var(--muted);
    }

    #clear-btn:hover { background: var(--border); color: var(--text); }

    /* ── Hint bar ────────────────────────────────────────────── */
    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 5px 0 2px;
      opacity: .65;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="logo">✦</div>
      <h1>Lensmania AI</h1>
      <span class="badge">Gemma 4</span>
    </header>

    <div id="messages">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">✦</div>
        <h2>Lensmania AI</h2>
        <p>Powered by Google Gemma 4 &mdash; ask anything.</p>
      </div>
    </div>

    <footer>
      <button id="clear-btn" class="icon-btn" title="Clear conversation" aria-label="Clear">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
      <textarea id="input" placeholder="Ask anything… (Enter to send, Shift+Enter for new line)" rows="1" autocomplete="off" spellcheck="true"></textarea>
      <button id="send-btn" class="icon-btn" title="Send" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </footer>
    <p class="hint">Enter&nbsp;to send &nbsp;·&nbsp; Shift+Enter new line</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
