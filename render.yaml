services:
  - type: web
    name: lensmania-store-backend
    runtime: docker
    region: virginia
    plan: starter
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Lensmania Labs
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://lensmania-store-backend.onrender.com
      - key: APP_TIMEZONE
        value: UTC
      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: BROADCAST_CONNECTION
        value: log
      - key: CACHE_STORE
        value: file
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: 120
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        value: adc5c1001@smtp-brevo.com
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: no-reply@lensmania.ae
      - key: MAIL_FROM_NAME
        value: Lensmania Labs
      - key: CORS_ALLOWED_ORIGINS
        value: https://labs.lensmania.ae
      - key: JWT_SECRET
        sync: false
      - key: MAX_OFFLINE_GRACE_SECONDS
        value: 10800
